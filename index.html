<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            /* ছবির মতো ৩ লেয়ার ব্যাকগ্রাউন্ড */
            background: linear-gradient(180deg, 
                #003144 0%, 
                #003144 45%, 
                #c2185b 55%, 
                #004d00 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ১. হেডার সেকশন */
        .header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #001f2d;
            border-bottom: 2px solid #00f2ff;
        }
        .profile { display: flex; align-items: center; gap: 10px; }
        .avatar {
            width: 45px; height: 45px;
            border-radius: 50%;
            background: #008cff;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 2px solid #00f2ff;
        }
        .premium { color: #00f2ff; font-size: 10px; font-weight: bold; }

        /* ২. ইউটিউব ব্যানার (লাল বর্ডার) */
        .yt-card {
            margin: 20px;
            height: 250px;
            background: black;
            border: 4px solid #ff0000;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            text-decoration: none;
            color: white;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }
        .sub-btn {
            position: absolute; top: 15px; right: 15px;
            background: #cc0000; padding: 5px 10px;
            border-radius: 5px; font-size: 10px;
        }
        .yt-logo { font-size: 80px; color: #ff0000; }
        .yt-text { margin-top: 15px; font-weight: bold; letter-spacing: 3px; font-size: 22px; }

        /* ৩. গ্রিড আইকন (গ্লাস ডিজাইন) */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 15px;
        }
        .app {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
        }
        .app i { font-size: 35px; margin-bottom: 8px; }
        .app span { font-size: 12px; opacity: 0.9; }

    </style>
</head>
<body>

    <div class="header">
        <div class="profile">
            <div class="avatar">SH</div>
            <div>
                <div style="font-size: 13px; font-weight: bold;">MOHAMMAD SOHEL HOSSAIN</div>
                <div class="premium"><i class="fas fa-check-circle"></i> PREMIUM USER</div>
            </div>
        </div>
        <i class="fas fa-cog"></i>
    </div>

    <a href="#" class="yt-card">
        <div class="sub-btn">Subscribe <i class="fas fa-bell"></i></div>
        <i class="fab fa-youtube yt-logo"></i>
        <div class="yt-text">YOUTUBE</div>
    </a>

    <div class="grid">
        <a href="#" class="app"><i class="fab fa-google" style="color: #4285F4;"></i><span>Google</span></a>
        <a href="#" class="app"><i class="fab fa-facebook" style="color: #1877F2;"></i><span>Facebook</span></a>
        <a href="#" class="app"><i class="fas fa-wand-magic-sparkles" style="color: #C29BFF;"></i><span>Gemini AI</span></a>
        <a href="#" class="app"><i class="fab fa-tiktok" style="color: #ff0050;"></i><span>TikTok</span></a>
        <a href="#" class="app"><i class="fab fa-whatsapp" style="color: #25D366;"></i><span>WhatsApp</span></a>
        <a href="#" class="app"><i class="fas fa-book-quran" style="color: #FFD700;"></i><span>Al-Quran</span></a>
        <a href="#" class="app"><i class="fas fa-phone-alt" style="color: #34C759;"></i><span>Dialer</span></a>
        <a href="#" class="app"><i class="fas fa-wifi" style="color: #00f2ff;"></i><span>WiFi Setup</span></a>
        <a href="#" class="app"><i class="fab fa-github" style="color: white;"></i><span>GitHub New</span></a>
    </div>

</body>
</html>
