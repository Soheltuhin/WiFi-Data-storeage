<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Coin Wallet v2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: white; font-family: sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            transition: 0.3s;
        }
        .liquid-battery {
            width: 60px; height: 100px; border: 3px solid #3b82f6;
            position: relative; border-radius: 5px; overflow: hidden;
        }
        .liquid {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(to top, #00ff00, #34d399);
            height: 40%; /* Dynamic fill */
            animation: flow 2s infinite ease-in-out;
        }
        @keyframes flow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .glow-green { box-shadow: 0 0 15px #22c55e; }
        .glow-blue { box-shadow: 0 0 15px #3b82f6; }
        .glow-pink { box-shadow: 0 0 15px #ec4899; }
        .glow-red { box-shadow: 0 0 15px #ef4444; }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-2">
            <div class="w-12 h-12 bg-gray-600 rounded-full border-2 border-gray-400"></div> <div>
                <h2 class="text-[10sp] font-bold uppercase">USER NAMES</h2>
                <p class="text-xs text-green-400">PREMIUM USER</p>
            </div>
        </div>
        <div class="w-8 h-8 rounded-full border-2 border-green-500 flex items-center justify-center">
            <span class="text-green-500">⚙️</span> </div>
    </header>

    <section class="flex justify-center mb-10">
        <div class="w-[160px] h-[120px] glass-card border-2 border-cyan-500 flex flex-col items-center justify-center cursor-pointer">
            <div class="text-3xl">YouTube</div>
            <p class="text-[10px] mt-2 text-cyan-300 font-bold">WiFi-Data-Coins</p>
        </div>
    </section>

    <main class="grid grid-cols-3 gap-4">
        <div class="glass-card p-4 flex flex-col items-center glow-green"><span>Google</span></div>
        <div class="glass-card p-4 flex flex-col items-center glow-blue"><span>Facebook</span></div>
        <div class="glass-card p-4 flex flex-col items-center glow-pink"><span>Gemini AI</span></div>
        
        <div class="glass-card p-4 flex flex-col items-center glow-red"><span>TikTok</span></div>
        <div class="glass-card p-4 flex flex-col items-center glow-green"><span>WhatsApp</span></div>
        <div class="glass-card p-4 flex flex-col items-center glow-blue"><span>Al-Quran</span></div>
        
        <div class="glass-card p-4 flex flex-col items-center glow-pink"><span>Dialer</span></div>
        <div class="glass-card p-4 flex flex-col items-center glow-red"><span>Imo</span></div>
        <div class="glass-card p-4 flex flex-col items-center glow-green"><span>Messenger</span></div>
    </main>

    <div class="mt-10 flex flex-col items-center">
        <div class="liquid-battery">
            <div class="liquid"></div>
        </div>
        <p class="mt-2 text-sm">Coins: <span id="coinCount">400</span> / 1000</p>
    </div>

</body>
</html>
