<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammad Sohel Hossain - Pro Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-dark: #050f08; 
            --yt-red: #ff0000;
            --card-blue: #002b53; /* গাঢ় নীল ব্যাকগ্রাউন্ড */
            --card-hover: #004080;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 0;
            text-align: center;
            border-bottom: 1px solid var(--neon-blue);
            letter-spacing: 2px;
            font-size: 13px;
            font-weight: bold;
        }

        .profile-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: linear-gradient(90deg, #001f3f, #002b53);
            border-bottom: 2px solid var(--neon-blue);
        }

        .user-details {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            background: url('https://ui-avatars.com/api/?name=Sohel+Hossain&background=00f2ff&color=000');
            background-size: cover;
        }

        .user-text h2 {
            margin: 0;
            font-size: 13px;
            text-transform: uppercase;
        }

        .user-text p {
            margin: 1px 0 0;
            font-size: 10px;
            color: var(--neon-blue);
        }

        .youtube-section {
            padding: 15px 20px;
        }

        .yt-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a0000;
            border: 3px solid var(--yt-red);
            border-radius: 15px;
            padding: 20px 0;
            text-decoration: none;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        .yt-btn i { font-size: 45px; color: var(--yt-red); }
        .yt-btn span { color: white; font-weight: bold; margin-top: 5px; font-size: 18px; }

        /* App Grid - বক্স সাইজ আপডেট করা হয়েছে */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 5px 20px 20px;
            flex: 1;
        }

        .app-card {
            background: var(--card-blue); /* গাঢ় নীল রঙ */
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            height: 85px; /* আপনার চাহিদা অনুযায়ী ৮৫ পিক্সেল করা হয়েছে */
            transition: all 0.2s ease;
        }

        .app-card:active {
            background: var(--card-hover);
            transform: scale(0.95);
        }

        .app-card i {
            font-size: 30px; /* আইকন সাইজ ৩০ পিক্সেল */
            margin-bottom: 5px;
        }

        .app-card span {
            font-size: 10px;
            font-weight: 500;
            text-align: center;
        }

        .footer-line {
            height: 4px;
            background: var(--neon-blue);
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="top-bar">MOHAMMAD SOHEL HOSSAIN</div>

    <div class="profile-container">
        <div class="user-details">
            <div class="avatar"></div>
            <div class="user-text">
                <h2>MOHAMMAD SOHEL HOSSAIN</h2>
                <p><i class="fas fa-check-circle"></i> PREMIUM USER</p>
            </div>
        </div>
        <i class="fas fa-cog" style="color: var(--neon-blue); font-size: 18px;"></i>
    </div>

    <div class="youtube-section">
        <a href="intent://www.youtube.com/#Intent;package=com.google.android.youtube;scheme=https;end" class="yt-btn">
            <i class="fab fa-youtube"></i>
            <span>YOUTUBE</span>
        </a>
    </div>

    <div class="app-grid">
        <a href="https://www.google.com" class="app-card">
            <i class="fab fa-google" style="color: #4285F4;"></i>
            <span>Google</span>
        </a>
        <a href="fb://facewebmodal/f?href=https://www.facebook.com" class="app-card">
            <i class="fab fa-facebook" style="color: #1877F2;"></i>
            <span>Facebook</span>
        </a>
        <a href="https://gemini.google.com" class="app-card">
            <i class="fas fa-wand-magic-sparkles" style="color: #8E75FF;"></i>
            <span>Gemini AI</span>
        </a>

        <a href="intent://tiktok.com/#Intent;package=com.zhiliaoapp.musically;scheme=https;end" class="app-card">
            <i class="fab fa-tiktok" style="color: #ff0050;"></i>
            <span>TikTok</span>
        </a>
        <a href="whatsapp://send?text=Hi" class="app-card">
            <i class="fab fa-whatsapp" style="color: #25D366;"></i>
            <span>WhatsApp</span>
        </a>
        <a href="https://quran.com" class="app-card">
            <i class="fas fa-book-quran" style="color: #FFD700;"></i>
            <span>Al-Quran</span>
        </a>

        <a href="tel:" class="app-card">
            <i class="fas fa-phone-alt" style="color: #34C759;"></i>
            <span>Dialer</span>
        </a>
        <a href="intent:#Intent;action=android.settings.WIFI_SETTINGS;end" class="app-card">
            <i class="fas fa-wifi" style="color: #00f2ff;"></i>
            <span>WiFi Setup</span>
        </a>
        <a href="https://github.com/new" class="app-card">
            <i class="fab fa-github" style="color: #ffffff;"></i>
            <span>GitHub Up</span>
        </a>
    </div>

    <div class="footer-line"></div>

</body>
</html>
